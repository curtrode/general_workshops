name: Deploy Workshops to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - vibes/dist/**
      - games/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site/vibes _site/games _site/games/slides
          cp -r vibes/dist/* _site/vibes/
          cp vibes/dist/404.html _site/404.html
          cp games/arcade.html _site/games/index.html 2>/dev/null || true
          cp games/*-game.html _site/games/ 2>/dev/null || true
          if [ -d games/dist ]; then cp -r games/dist/* _site/games/slides/; fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
