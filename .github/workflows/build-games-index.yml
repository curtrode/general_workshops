name: Rebuild Games Index

on:
  push:
    branches: [main]
    paths:
      - "games/*-game.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild index.html
        run: python games/build_index.py

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games/arcade.html
          git diff --cached --quiet || git commit -m "Rebuild games index"
          git push
